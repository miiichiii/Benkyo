<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>九九クエスト 親ビューア</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --surface: #fff;
      --ink: #17212b;
      --muted: #66717f;
      --line: #d8e2ea;
      --blue: #276ef1;
      --teal: #0f9f9a;
      --coral: #ef6461;
      --green: #35a867;
      --gold: #f2b84b;
      --shadow: 0 12px 32px rgba(23, 33, 43, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fbfd, var(--bg));
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .wrap {
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 18px 14px 42px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 2px;
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      line-height: 1.1;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 1.25rem;
    }

    .muted {
      color: var(--muted);
      font-weight: 750;
    }

    .panel,
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
      margin-bottom: 16px;
    }

    .login-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)) auto auto auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    input {
      min-height: 46px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
      color: var(--ink);
      font-weight: 850;
    }

    .primary-button,
    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 900;
    }

    .primary-button {
      color: #fff;
      background: var(--blue);
    }

    .secondary-button {
      color: var(--ink);
      background: #e8f0f4;
      border: 1px solid var(--line);
    }

    .status {
      min-height: 24px;
      margin: 10px 0 0;
      color: var(--muted);
      font-weight: 800;
    }

    .status.warn {
      color: #8b211f;
    }

    .status.ok {
      color: #17623b;
    }

    .account-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .card {
      padding: 14px;
    }

    .metric strong {
      display: block;
      font-size: 1.75rem;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 850;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(260px, 0.75fr) minmax(360px, 1.25fr);
      gap: 16px;
    }

    .child-list {
      display: grid;
      gap: 10px;
    }

    .child-button {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--teal);
      border-radius: 8px;
      background: #fbfdfe;
      color: var(--ink);
      text-align: left;
      font-weight: 900;
    }

    .child-button.active {
      border-left-color: var(--blue);
      background: #eef5ff;
    }

    .child-button span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .detail-grid {
      display: grid;
      gap: 16px;
    }

    .weak-list,
    .attempt-list,
    .daily-list {
      display: grid;
      gap: 8px;
    }

    .weak-row,
    .attempt-row,
    .daily-row {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
      font-weight: 850;
    }

    .weak-row span,
    .attempt-row span,
    .daily-row span {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .bar {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7edf0;
    }

    .bar div {
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .bar.warn div {
      background: var(--coral);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 820px) {
      header,
      .login-grid,
      .dashboard {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .weak-row,
      .attempt-row,
      .daily-row {
        grid-template-columns: 76px 1fr;
      }

      .weak-row .bar,
      .daily-row .bar {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 420px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>親ビューア</h1>
        <p class="muted">九九クエストの実施回数、正答率、苦手問題を確認します。</p>
      </div>
      <a class="secondary-button" href="kuku-kantan3.html">子ども画面</a>
    </header>

    <section class="panel">
      <h2>接続</h2>
      <div class="login-grid">
        <div class="field">
          <label for="family-code">ファミリーコード</label>
          <input id="family-code" type="text" inputmode="latin" autocomplete="off">
        </div>
        <div class="field">
          <label for="child-id">子どもID（空なら全員）</label>
          <input id="child-id" type="text" inputmode="latin" autocomplete="off">
        </div>
        <button class="secondary-button" id="google-button" type="button">Googleログイン</button>
        <div class="account-pill" id="account-pill">未ログイン</div>
        <button class="primary-button" id="load-button" type="button">読み込み</button>
      </div>
      <p class="status" id="status">kuku-firebase-config.js の設定を使います。</p>
    </section>

    <section class="summary-grid hidden" id="summary-grid">
      <div class="card metric">
        <strong id="metric-attempts">0</strong>
        <span>実施回数</span>
      </div>
      <div class="card metric">
        <strong id="metric-answered">0</strong>
        <span>回答数</span>
      </div>
      <div class="card metric">
        <strong id="metric-accuracy">0%</strong>
        <span>正答率</span>
      </div>
      <div class="card metric">
        <strong id="metric-weak">0</strong>
        <span>苦手</span>
      </div>
      <div class="card metric">
        <strong id="metric-last">-</strong>
        <span>最終練習</span>
      </div>
    </section>

    <section class="dashboard hidden" id="dashboard">
      <aside class="panel">
        <h2>子ども</h2>
        <div class="child-list" id="child-list"></div>
      </aside>

      <div class="detail-grid">
        <section class="panel">
          <h2 id="child-title">詳細</h2>
          <div class="daily-list" id="daily-list"></div>
        </section>

        <section class="panel">
          <h2>苦手ランキング</h2>
          <div class="weak-list" id="weak-list"></div>
        </section>

        <section class="panel">
          <h2>練習履歴</h2>
          <div class="attempt-list" id="attempt-list"></div>
        </section>
      </div>
    </section>
  </div>

  <script src="kuku-firebase-config.js"></script>
  <script type="module">
    const config = window.KUKU_FIREBASE_CONFIG || {};
    const firebaseConfig = config.firebaseConfig || {};
    const els = {
      familyCode: document.getElementById('family-code'),
      childId: document.getElementById('child-id'),
      googleButton: document.getElementById('google-button'),
      accountPill: document.getElementById('account-pill'),
      loadButton: document.getElementById('load-button'),
      status: document.getElementById('status'),
      summaryGrid: document.getElementById('summary-grid'),
      dashboard: document.getElementById('dashboard'),
      childList: document.getElementById('child-list'),
      childTitle: document.getElementById('child-title'),
      weakList: document.getElementById('weak-list'),
      attemptList: document.getElementById('attempt-list'),
      dailyList: document.getElementById('daily-list'),
      attempts: document.getElementById('metric-attempts'),
      answered: document.getElementById('metric-answered'),
      accuracy: document.getElementById('metric-accuracy'),
      weak: document.getElementById('metric-weak'),
      last: document.getElementById('metric-last')
    };

    els.familyCode.value = config.familyCode || '';
    els.childId.value = config.childId || '';

    const allowedParentEmail = (config.parentEmail || 'hamamicchi@gmail.com').toLowerCase();
    let firebaseReady = false;
    let firestore = null;
    let auth = null;
    let firebaseFns = null;
    let currentParent = null;
    let loadedChildren = [];
    let selectedChild = null;

    els.googleButton.addEventListener('click', signInParent);
    els.loadButton.addEventListener('click', loadDashboard);

    setStatus(config.enabled ? `${allowedParentEmail} のGoogleアカウントでログインしてください。` : 'Firebase設定が未入力です。kuku-firebase-config.js を編集してください。', config.enabled ? '' : 'warn');

    async function ensureFirebase() {
      if (firebaseReady) return;
      if (!config.enabled || !firebaseConfig.apiKey || String(firebaseConfig.apiKey).includes('YOUR_')) {
        throw new Error('Firebase設定が未入力です。');
      }
      const [
        { initializeApp },
        { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged },
        { getFirestore, collection, getDocs, doc, getDoc }
      ] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js'),
        import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js')
      ]);

      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      firestore = getFirestore(app);
      firebaseFns = { collection, getDocs, doc, getDoc, GoogleAuthProvider, signInWithPopup, signOut };
      onAuthStateChanged(auth, user => {
        currentParent = user && isAllowedParent(user) ? user : null;
        renderAccount(user);
      });
      firebaseReady = true;
    }

    async function signInParent() {
      try {
        await ensureFirebase();
        if (auth.currentUser && isAllowedParent(auth.currentUser)) {
          await firebaseFns.signOut(auth);
          currentParent = null;
          renderAccount(null);
          setStatus(`${allowedParentEmail} のGoogleアカウントでログインしてください。`, '');
          return;
        }
        const provider = new firebaseFns.GoogleAuthProvider();
        provider.setCustomParameters({ login_hint: allowedParentEmail });
        const credential = await firebaseFns.signInWithPopup(auth, provider);
        if (!isAllowedParent(credential.user)) {
          const actual = credential.user.email || '不明なアカウント';
          await firebaseFns.signOut(auth);
          currentParent = null;
          renderAccount(null);
          setStatus(`${actual} では見られません。${allowedParentEmail} でログインしてください。`, 'warn');
          return;
        }
        currentParent = credential.user;
        renderAccount(currentParent);
        setStatus(`${currentParent.email} でログインしました。読み込みできます。`, 'ok');
      } catch (error) {
        setStatus(`Googleログインに失敗しました: ${error.message}`, 'warn');
      }
    }

    function isAllowedParent(user) {
      return Boolean(user && user.email && user.email.toLowerCase() === allowedParentEmail);
    }

    function renderAccount(user) {
      if (user && isAllowedParent(user)) {
        els.accountPill.textContent = user.email;
        els.googleButton.textContent = 'ログアウト';
      } else if (user && user.email) {
        els.accountPill.textContent = `${user.email} は不可`;
        els.googleButton.textContent = 'Googleログイン';
      } else {
        els.accountPill.textContent = '未ログイン';
        els.googleButton.textContent = 'Googleログイン';
      }
    }

    async function loadDashboard() {
      const familyCode = normalizeCode(els.familyCode.value || '');
      const childId = normalizeCode(els.childId.value || '');
      if (!familyCode) {
        setStatus('ファミリーコードを入れてください。', 'warn');
        return;
      }
      if (!config.enabled || !firebaseConfig.apiKey || String(firebaseConfig.apiKey).includes('YOUR_')) {
        setStatus('Firebase設定が未入力です。kuku-firebase-config.js を編集してください。', 'warn');
        return;
      }

      try {
        await ensureFirebase();
        const user = auth.currentUser;
        if (!isAllowedParent(user)) {
          setStatus(`${allowedParentEmail} のGoogleアカウントでログインしてください。`, 'warn');
          return;
        }
        currentParent = user;
        renderAccount(currentParent);
        setStatus('読み込み中です。', '');
        loadedChildren = await fetchChildren(familyCode, childId);
        if (loadedChildren.length === 0) {
          setStatus('該当する記録がまだありません。子ども画面で同期してください。', 'warn');
          els.summaryGrid.classList.add('hidden');
          els.dashboard.classList.add('hidden');
          return;
        }
        selectedChild = loadedChildren[0];
        renderDashboard(familyCode);
        setStatus(`${loadedChildren.length}件の子ども記録を読み込みました。`, 'ok');
      } catch (error) {
        setStatus(`読み込みに失敗しました: ${error.message}`, 'warn');
      }
    }

    async function fetchChildren(familyCode, childId) {
      const { collection, getDocs, doc, getDoc } = firebaseFns;
      if (childId) {
        const snapshot = await getDoc(doc(firestore, 'kukuFamilies', familyCode, 'children', childId));
        return snapshot.exists() ? [{ id: snapshot.id, ...snapshot.data() }] : [];
      }
      const snapshots = await getDocs(collection(firestore, 'kukuFamilies', familyCode, 'children'));
      return snapshots.docs.map(snapshot => ({ id: snapshot.id, ...snapshot.data() }))
        .sort((a, b) => String(b.updatedAtLocal || '').localeCompare(String(a.updatedAtLocal || '')));
    }

    async function fetchAttempts(familyCode, childId) {
      const { collection, getDocs } = firebaseFns;
      const snapshots = await getDocs(collection(firestore, 'kukuFamilies', familyCode, 'children', childId, 'attempts'));
      return snapshots.docs.map(snapshot => ({ id: snapshot.id, ...snapshot.data() }))
        .sort((a, b) => String(b.completedAt || '').localeCompare(String(a.completedAt || '')));
    }

    async function renderDashboard(familyCode) {
      els.summaryGrid.classList.remove('hidden');
      els.dashboard.classList.remove('hidden');
      renderChildList(familyCode);
      await renderChildDetail(familyCode, selectedChild);
    }

    function renderChildList(familyCode) {
      els.childList.innerHTML = loadedChildren.map(child => `
        <button class="child-button ${child.id === selectedChild.id ? 'active' : ''}" type="button" data-child="${child.id}">
          ${escapeHtml(child.childName || child.id)}
          <span>${child.totalAnswered || 0}問・${child.accuracy || 0}%・Lv ${child.level || 1}</span>
        </button>
      `).join('');
      els.childList.querySelectorAll('[data-child]').forEach(button => {
        button.addEventListener('click', async () => {
          selectedChild = loadedChildren.find(child => child.id === button.dataset.child);
          renderChildList(familyCode);
          await renderChildDetail(familyCode, selectedChild);
        });
      });
    }

    async function renderChildDetail(familyCode, child) {
      const progress = child.progress || {};
      const attempts = await fetchAttempts(familyCode, child.id);
      const totalAnswered = child.totalAnswered || progress.totalAnswered || 0;
      const totalCorrect = child.totalCorrect || progress.totalCorrect || 0;
      const accuracy = totalAnswered === 0 ? 0 : Math.round((totalCorrect / totalAnswered) * 100);
      const weak = Array.isArray(progress.topWeak) ? progress.topWeak : [];
      els.childTitle.textContent = `${child.childName || child.id} の詳細`;
      els.attempts.textContent = attempts.length || child.attemptCount || 0;
      els.answered.textContent = totalAnswered;
      els.accuracy.textContent = `${accuracy}%`;
      els.weak.textContent = weak.length;
      els.last.textContent = formatDate(child.lastPracticeDate || progress.lastPracticeDate);
      renderDaily(progress.daily || {});
      renderWeakList(weak);
      renderAttempts(attempts);
    }

    function renderDaily(daily) {
      const rows = Object.values(daily).sort((a, b) => String(b.date).localeCompare(String(a.date))).slice(0, 14);
      if (rows.length === 0) {
        els.dailyList.innerHTML = '<p class="muted">日別データはまだありません。</p>';
        return;
      }
      els.dailyList.innerHTML = rows.map(row => `
        <div class="daily-row">
          <strong>${formatDate(row.date)}</strong>
          <span>${row.correct} / ${row.total}・${row.type === 'weak' ? '苦手だけ' : '今日のミッション'}</span>
          <div class="bar"><div style="width:${row.percent || 0}%"></div></div>
        </div>
      `).join('');
    }

    function renderWeakList(weak) {
      if (weak.length === 0) {
        els.weakList.innerHTML = '<p class="muted">苦手データはまだありません。</p>';
        return;
      }
      els.weakList.innerHTML = weak.slice(0, 10).map(item => {
        const total = (item.correct || 0) + (item.wrong || 0);
        const wrongRate = total === 0 ? 0 : Math.round(((item.wrong || 0) / total) * 100);
        return `
          <div class="weak-row">
            <strong>${item.a} × ${item.b}</strong>
            <span>間違い ${item.wrong || 0}回・連続 ${item.streak || 0}</span>
            <div class="bar warn"><div style="width:${Math.max(12, wrongRate)}%"></div></div>
          </div>
        `;
      }).join('');
    }

    function renderAttempts(attempts) {
      if (attempts.length === 0) {
        els.attemptList.innerHTML = '<p class="muted">練習履歴はまだありません。</p>';
        return;
      }
      els.attemptList.innerHTML = attempts.slice(0, 30).map(attempt => `
        <div class="attempt-row">
          <strong>${formatDateTime(attempt.completedAt || attempt.date)}</strong>
          <span>${attempt.type === 'weak' ? '苦手だけ' : '今日のミッション'}</span>
          <span>${attempt.correct} / ${attempt.total} (${attempt.percent}%)</span>
        </div>
      `).join('');
    }

    function setStatus(message, tone) {
      els.status.className = `status ${tone || ''}`.trim();
      els.status.textContent = message;
    }

    function normalizeCode(value) {
      return value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatDateTime(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const hour = String(date.getHours()).padStart(2, '0');
      const minute = String(date.getMinutes()).padStart(2, '0');
      return `${date.getMonth() + 1}/${date.getDate()} ${hour}:${minute}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }
  </script>
</body>
</html>
